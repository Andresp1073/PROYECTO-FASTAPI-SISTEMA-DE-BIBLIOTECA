[alembic]
script_location = alembic
prepend_sys_path = .

# La URL real se inyecta desde alembic/env.py leyendo .env (core/settings.py)
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
datefmt = %Y-%m-%d %H:%M:%S